# Railway deploy configuration.
# Reference: https://docs.railway.app/reference/config-as-code
#
# Railway provisions Postgres + Redis as managed plugins; we deploy two
# services (web + worker) from this repo. Beat is folded into the worker
# via `--beat` to keep the service count down (acceptable for a demo;
# split it back out as in docker-compose for production).
#
# Setup:
#   1. railway.app → New Project → Deploy from GitHub → pick this repo
#   2. + New → Database → Postgres (provisions DATABASE_URL)
#   3. + New → Database → Redis (provisions REDIS_URL)
#   4. Add a second service from the same repo for the worker; override
#      its start command with the celery line below.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "python manage.py migrate --noinput && python manage.py loaddata seeds/sources.json seeds/instruments.json && python manage.py apply_post_migrate && gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --worker-class uvicorn.workers.UvicornWorker --access-logfile - --error-logfile -"
healthcheckPath = "/health/ready/"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[[deploy.environmentVariables]]
name = "DJANGO_SETTINGS_MODULE"
value = "config.settings.prod"

[[deploy.environmentVariables]]
name = "DJANGO_ALLOWED_HOSTS"
value = "*.railway.app,*.up.railway.app"

[[deploy.environmentVariables]]
name = "EXPOSE_ADMIN"
value = "false"

[[deploy.environmentVariables]]
name = "EXPOSE_METRICS"
value = "false"
