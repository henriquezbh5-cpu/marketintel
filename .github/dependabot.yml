version: 2
updates:
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    groups:
      django-stack:
        patterns: ["django*", "djangorestframework*", "drf-*"]
      celery-stack:
        patterns: ["celery*", "kombu*", "redis*"]
      dagster-stack:
        patterns: ["dagster*"]
      observability:
        patterns: ["opentelemetry-*", "structlog*", "*prometheus*"]
    open-pull-requests-limit: 10

  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: weekly

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
