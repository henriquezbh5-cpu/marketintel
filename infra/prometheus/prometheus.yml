global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - alerts.yml

scrape_configs:
  - job_name: marketintel-web
    metrics_path: /metrics
    kubernetes_sd_configs:
      - role: pod
        namespaces: {names: [marketintel]}
    relabel_configs:
      - source_labels: [__meta_kubernetes_pod_label_component]
        action: keep
        regex: web
      - source_labels: [__meta_kubernetes_pod_name]
        target_label: pod
      - source_labels: [__meta_kubernetes_namespace]
        target_label: namespace

  - job_name: marketintel-worker
    metrics_path: /metrics
    kubernetes_sd_configs:
      - role: pod
        namespaces: {names: [marketintel]}
    relabel_configs:
      - source_labels: [__meta_kubernetes_pod_label_component]
        action: keep
        regex: worker
