apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: marketintel

resources:
  - namespace.yaml
  - configmap.yaml
  - secret.example.yaml
  - postgres-statefulset.yaml
  - redis-statefulset.yaml
  - web-deployment.yaml
  - web-service.yaml
  - web-hpa.yaml
  - worker-deployment.yaml
  - beat-deployment.yaml
  - dagster-deployment.yaml
  - ingress.yaml
  - networkpolicy.yaml
  - poddisruptionbudget.yaml
  - migrations-job.yaml

commonLabels:
  app.kubernetes.io/name: marketintel
  app.kubernetes.io/part-of: data-platform

configMapGenerator:
  - name: marketintel-postgres-init
    files:
      - 01_extensions.sql=../../postgres/init/01_extensions.sql
      - 03_gold_marts.sql=../../postgres/init/03_gold_marts.sql
