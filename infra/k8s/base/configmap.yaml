apiVersion: v1
kind: ConfigMap
metadata:
  name: marketintel-config
  namespace: marketintel
data:
  DJANGO_SETTINGS_MODULE: config.settings.prod
  DJANGO_ALLOWED_HOSTS: "*"
  POSTGRES_HOST: postgres
  POSTGRES_PORT: "5432"
  POSTGRES_DB: marketintel
  POSTGRES_USER: marketintel
  REDIS_URL: redis://redis:6379/0
  CELERY_BROKER_URL: redis://redis:6379/1
  CELERY_RESULT_BACKEND: redis://redis:6379/2
  S3_ENDPOINT_URL: http://minio:9000
  S3_REGION: us-east-1
  S3_BRONZE_BUCKET: bronze
  S3_SILVER_BUCKET: silver
  S3_GOLD_BUCKET: gold
  COINGECKO_BASE_URL: https://api.coingecko.com/api/v3
  COINGECKO_RATE_LIMIT_PER_MIN: "30"
  BINANCE_BASE_URL: https://api.binance.com
  BINANCE_RATE_LIMIT_PER_MIN: "1200"
  CRYPTOPANIC_BASE_URL: https://cryptopanic.com/api/v1
  LOG_LEVEL: INFO
  OTEL_SERVICE_NAME: marketintel
  ENABLE_DAGSTER_SENSORS: "True"
