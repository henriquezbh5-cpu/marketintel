apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
  namespace: marketintel
spec:
  serviceName: redis
  replicas: 1
  selector: {matchLabels: {app: marketintel, component: redis}}
  template:
    metadata: {labels: {app: marketintel, component: redis}}
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          args: ["--appendonly", "yes"]
          ports: [{name: redis, containerPort: 6379}]
          resources:
            requests: {cpu: 100m, memory: 256Mi}
            limits:   {cpu: 500m, memory: 1Gi}
          volumeMounts: [{name: data, mountPath: /data}]
          readinessProbe:
            exec: {command: ["redis-cli", "ping"]}
            periodSeconds: 5
  volumeClaimTemplates:
    - metadata: {name: data}
      spec:
        accessModes: [ReadWriteOnce]
        resources: {requests: {storage: 5Gi}}
---
apiVersion: v1
kind: Service
metadata: {name: redis, namespace: marketintel}
spec:
  type: ClusterIP
  clusterIP: None
  selector: {app: marketintel, component: redis}
  ports: [{name: redis, port: 6379, targetPort: 6379}]
