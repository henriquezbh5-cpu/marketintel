apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: marketintel
  labels:
    app: marketintel
    component: web
spec:
  replicas: 3
  revisionHistoryLimit: 5
  selector:
    matchLabels: {app: marketintel, component: web}
  strategy:
    type: RollingUpdate
    rollingUpdate: {maxSurge: 1, maxUnavailable: 0}
  template:
    metadata:
      labels: {app: marketintel, component: web}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: /metrics
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: web
          image: ghcr.io/humberto/marketintel:latest
          imagePullPolicy: IfNotPresent
          command: ["gunicorn", "config.wsgi:application",
                    "--bind", "0.0.0.0:8000",
                    "--workers", "4",
                    "--worker-class", "uvicorn.workers.UvicornWorker",
                    "--access-logfile", "-",
                    "--error-logfile", "-"]
          ports:
            - {name: http, containerPort: 8000}
          envFrom:
            - configMapRef: {name: marketintel-config}
            - secretRef:    {name: marketintel-secrets}
          resources:
            requests: {cpu: 200m, memory: 256Mi}
            limits:   {cpu: "1",   memory: 512Mi}
          livenessProbe:
            httpGet: {path: /health/live/, port: http}
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet: {path: /health/ready/, port: http}
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2
          startupProbe:
            httpGet: {path: /health/live/, port: http}
            failureThreshold: 30
            periodSeconds: 2
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: {drop: [ALL]}
          volumeMounts:
            - {name: tmp, mountPath: /tmp}
      volumes:
        - {name: tmp, emptyDir: {}}
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector: {matchLabels: {app: marketintel, component: web}}
