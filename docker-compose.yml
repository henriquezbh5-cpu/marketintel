services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-marketintel}
      POSTGRES_USER: ${POSTGRES_USER:-marketintel}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-marketintel}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "${POSTGRES_HOST_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-marketintel}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_HOST_PORT:-6380}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - "${MINIO_HOST_PORT:-9100}:9000"
      - "${MINIO_CONSOLE_HOST_PORT:-9101}:9001"
    healthcheck:
      test: ["CMD-SHELL", "mc ready local || exit 1"]
      interval: 5s
      retries: 10
      start_period: 10s

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_started
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        sleep 5
        mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin}
        mc mb -p local/bronze || true
        mc mb -p local/silver || true
        mc mb -p local/gold || true
        mc ls local/

  web:
    build:
      context: .
      target: dev
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    env_file: .env
    ports:
      - "${WEB_HOST_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      target: dev
    command: celery -A config worker -l INFO -Q default,ingest,transform,dlq -c 4
    volumes:
      - .:/app
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  beat:
    build:
      context: .
      target: dev
    command: celery -A config beat -l INFO
    volumes:
      - .:/app
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  dagster:
    build:
      context: .
      target: dev
    command: dagster dev -h 0.0.0.0 -p 3000 -m pipelines.orchestration
    volumes:
      - .:/app
      - dagster_home:/dagster_home
    env_file: .env
    environment:
      DAGSTER_HOME: /dagster_home
    ports:
      - "${DAGSTER_HOST_PORT:-3100}:3000"
    depends_on:
      postgres:
        condition: service_healthy

  flower:
    build:
      context: .
      target: dev
    command: celery -A config flower --port=5555
    env_file: .env
    ports:
      - "${FLOWER_HOST_PORT:-5556}:5555"
    depends_on:
      - redis

volumes:
  postgres_data:
  redis_data:
  minio_data:
  dagster_home:
